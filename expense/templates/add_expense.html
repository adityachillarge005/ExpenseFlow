{% extends 'base.html' %}

{% block title %}Add Expense - ExpenseFlow{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-12 col-md-8 col-lg-6">
        <!-- Back Button Link -->
        <a href="{% url 'view_expense' %}" class="btn btn-link text-decoration-none text-muted mb-3 p-0 d-inline-flex align-items-center">
            <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
        </a>
        
        <!-- Form Card -->
        <div class="card premium-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="rounded-circle bg-primary bg-opacity-10 text-primary p-3 d-inline-flex mb-3">
                    <i class="bi bi-wallet-fill fs-3"></i>
                </div>
                <h3 class="fw-bold mb-1">Add Transaction</h3>
                <p class="text-muted small">Record a new expense in your tracker database</p>
            </div>
            
            <form method="POST" class="d-flex flex-column gap-3">
                {% csrf_token %}
                
                <!-- Title Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Title</label>
                    <input type="text" class="custom-form-input" placeholder="e.g., Grocery Shopping" name="title" id="title" required>
                </div>
                
                <!-- Amount Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Amount (₹)</label>
                    <input type="number" step="0.01" class="custom-form-input" placeholder="0.00" name="amount" required>
                </div>
                
                <!-- Category Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Category</label>
                    <input
                        type="text"
                        name="category"
                        class="form-control"
                        id="category"
                    >
                </div>
                
                <!-- Date Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Date</label>
                    <input type="date" class="custom-form-input" name="date" required>
                </div>
                
                <!-- Description Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Description</label>
                    <textarea class="custom-form-input" rows="3" placeholder="Add more details..." name="description"  id="description"></textarea>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 py-2.5">
                    <i class="bi bi-plus-lg me-1"></i> Add Expense
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    console.log("Script Loaded");

    const titleInput = document.getElementById("title");
    const categoryInput = document.getElementById("category");
    const descriptionInput = document.getElementById("description");

    titleInput.addEventListener("blur", function () {
        const title = titleInput.value;
        if (title.trim() === "") {
            return;
        }

        fetch(`/predict_category/?title=${title}`)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                categoryInput.value = data.category;
                descriptionInput.value = data.description;
            })
            .catch(function(error) {
                console.error(error);
            });
    });
</script>
{% endblock %}
