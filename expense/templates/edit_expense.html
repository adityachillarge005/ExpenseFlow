{% extends 'base.html' %}

{% block title %}Edit Expense - ExpenseFlow{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-12 col-md-8 col-lg-6">
        <!-- Back Button Link -->
        <a href="{% url 'view_expense' %}" class="btn btn-link text-decoration-none text-muted mb-3 p-0 d-inline-flex align-items-center">
            <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
        </a>
        
        <!-- Form Card -->
        <div class="card premium-card border-0 p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="rounded-circle bg-primary bg-opacity-10 text-primary p-3 d-inline-flex mb-3">
                    <i class="bi bi-pencil-square fs-3"></i>
                </div>
                <h3 class="fw-bold mb-1">Edit Transaction</h3>
                <p class="text-muted small">Update details for "{{ expense.title }}"</p>
            </div>
            
            <form method="POST" class="d-flex flex-column gap-3">
                {% csrf_token %}
                
                <!-- Title Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Title</label>
                    <input type="text" class="custom-form-input" placeholder="e.g., Grocery Shopping" name="title" value="{{ expense.title }}" required>
                </div>
                
                <!-- Amount Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Amount (₹)</label>
                    <input type="number" step="0.01" class="custom-form-input" placeholder="0.00" name="amount" value="{{ expense.amount }}" required>
                </div>
                
                <!-- Category Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Category</label>
                    <select name="category" class="custom-form-input" required>
                        <option value="Food" {% if expense.category == "Food" %}selected{% endif %}>Food</option>
                        <option value="Travel" {% if expense.category == "Travel" %}selected{% endif %}>Travel</option>
                        <option value="Sports" {% if expense.category == "Sports" %}selected{% endif %}>Sports</option>
                    </select>
                </div>
                
                <!-- Date Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Date</label>
                    <input type="date" class="custom-form-input" name="date" value="{{ expense.date|date:'Y-m-d' }}" required>
                </div>
                
                <!-- Description Field -->
                <div>
                    <label class="form-label fw-medium text-body small">Description</label>
                    <textarea class="custom-form-input" rows="3" placeholder="Add more details..." name="description">{{ expense.description }}</textarea>
                </div>
                
                <!-- Buttons -->
                <div class="d-flex gap-3 mt-3">
                    <a href="{% url 'view_expense' %}" class="btn btn-outline-secondary w-50 py-2.5">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-primary w-50 py-2.5">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
