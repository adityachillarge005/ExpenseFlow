<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center text-primary" href="{% url 'home' %}">
            <span class="me-2 fs-4">💰</span>
            <span>ExpenseFlow</span>
        </a>
        
        <!-- Toggle Button for Mobile -->
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'view_expense' %}active{% endif %}" href="{% url 'view_expense' %}">
                            <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'add_expense' %}active{% endif %}" href="{% url 'add_expense' %}">
                            <i class="bi bi-plus-circle-fill me-1"></i>Add Expense
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'view_expense' and 'view-expenses' in request.path %}active{% endif %}" href="{% url 'view_expense' %}">
                            <i class="bi bi-list-columns-reverse me-1"></i>View Expenses
                        </a>
                    </li>
                    <li class="nav-item me-lg-2">
                        <!-- Logout form as a post action to match Django requirement -->
                        <form method="POST" action="{% url 'user_logout' %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="nav-link border-0 bg-transparent text-danger w-100 text-start">
                                <i class="bi bi-box-arrow-right me-1"></i>Logout
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'user_login' %}active{% endif %}" href="{% url 'user_login' %}">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Login
                        </a>
                    </li>
                    <li class="nav-item me-lg-2">
                        <a class="nav-link {% if request.resolver_match.url_name == 'register' %}active{% endif %}" href="{% url 'register' %}">
                            <i class="bi bi-person-plus-fill me-1"></i>Register
                        </a>
                    </li>
                {% endif %}
                
                <!-- Dark Mode Toggle -->
                <li class="nav-item mt-2 mt-lg-0">
                    <button id="theme-toggle" class="btn" title="Toggle Theme" aria-label="Toggle Theme">
                        <i class="bi bi-moon-fill text-primary"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>
