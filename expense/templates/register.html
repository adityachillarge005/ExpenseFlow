{% extends 'base.html' %}

{% block title %}Create Account - ExpenseFlow{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-4 fade-in">
    <div class="col-12 col-md-8 col-lg-5">
        <!-- Auth Card -->
        <div class="card premium-card p-4 p-md-5">
            <div class="text-center mb-4">
                <a class="d-flex align-items-center justify-content-center text-decoration-none text-primary fs-3 fw-bold mb-3" href="{% url 'home' %}">
                    <span class="me-2">💰</span>
                    <span>ExpenseFlow</span>
                </a>
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted small">Register to start tracking your daily expenses today</p>
            </div>
            
            <form method="POST" class="d-flex flex-column gap-1">
                {% csrf_token %}
                
                <!-- Django form wrapper for styling fields -->
                <div class="django-bootstrap-form">
                    {{ form }}
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2 py-2.5">
                    Sign Up
                </button>
            </form>
            
            <div class="text-center mt-4 pt-2 border-top">
                <span class="text-muted small">Already have an account?</span>
                <a href="{% url 'user_login' %}" class="small text-primary fw-medium text-decoration-none ms-1">
                    Sign In
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
